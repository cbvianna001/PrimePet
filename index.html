<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Pet</title>
    <style>
        :root { --primary: #ff8c00; --dark: #222; --light: #fff; --gray: #f4f4f4; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: var(--light); color: var(--dark); line-height: 1.6; }
        
        img { max-width: 100%; height: auto; }

        nav { background: var(--dark); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; margin: 0 10px; text-decoration: none; font-weight: bold; }
        
        header { background-color: var(--primary); padding: 15px; text-align: center; }
        .logo-img { max-width: 150px; display: block; margin: 0 auto; }
        
        .btn-insta { display: inline-block; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; padding: 8px 16px; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 10px; font-size: 0.9em; }
        
        .container { max-width: 900px; margin: auto; padding: 20px; }
        
        .grid-images { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 15px; 
            margin-top: 20px; 
        }
        
        .img-item { 
            width: 100%; 
            height: 250px; 
            object-fit: contain; /* Imagem inteira, sem cortes */
            background-color: #f4f4f4; 
            border-radius: 10px; 
            border: 2px solid #ddd; 
            display: block;
        }
        
        .btn-whats { display: inline-block; background-color: #25d366; color: white; padding: 10px 20px; text-decoration: none; border-radius: 50px; font-weight: bold; margin: 5px; }
        
        footer { background-color: var(--dark); color: white; text-align: center; padding: 20px; margin-top: 40px; font-size: 0.9em; }
    </style>
</head>
<body>

    <nav>
        <a href="#delivery">Delivery</a>
        <a href="#produtos">Vitrine</a>
        <a href="#contato">Contato</a>
    </nav>

    <header>
        <img src="logo.png" alt="Logo" class="logo-img">
        <a href="https://www.instagram.com/primepetsjc/" class="btn-insta" target="_blank">Siga-nos @primepetsjc</a>
    </header>

    <div class="container">
        
        <section id="delivery" style="text-align:center;">
            <h2>Peça pelo Delivery Express</h2>
            <p>Atendimento rápido nas nossas 3 unidades:</p>
            <a href="https://wa.me/5512982503019" class="btn-whats">Jd. Souto</a>
            <a href="https://wa.me/5512997611020" class="btn-whats">Res. Flamboyant</a>
            <a href="https://wa.me/5512981674108" class="btn-whats">Res. São Francisco</a>
        </section>

        <section id="produtos">
            <h2 style="color: var(--primary); text-align:center;">Nossa Vitrine</h2>
            <div class="grid-images">
                <img src="img-1.jpg" alt="Produto 1" class="img-item">
                <img src="img-2.jpg" alt="Produto 2" class="img-item">
                <img src="img-3.jpg" alt="Produto 3" class="img-item">
                <img src="img-4.jpg" alt="Produto 4" class="img-item">
            </div>
        </section>
    </div>

    <footer id="contato">
        <p>&copy; 2026 Prime Pet - Todos os direitos reservados</p>
        <p>Site desenvolvido por <strong>@systemsjc_</strong></p>
    </footer>

</body>
</html>
